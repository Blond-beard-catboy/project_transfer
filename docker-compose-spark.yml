version: '3.8'

services:
  spark-master:
    image: apache/spark-py
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/spark/jobs
    extra_hosts:
      - "host.docker.internal:host-gateway"   # для доступа к PostgreSQL на хосте
    networks:
      - spark-net
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    image: apache/spark-py
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./jobs:/opt/spark/jobs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - spark-net
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

  spark-submit:
    image: apache/spark-py
    depends_on:
      - spark-master
      - spark-worker
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./jobs:/opt/spark/jobs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: [ "tail", "-f", "/dev/null" ]
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge